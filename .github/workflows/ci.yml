name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref. On a PR, a new push cancels the prior
# run (cancel-in-progress). On main, the group is per-SHA so pushes never cancel
# each other — every main commit keeps its full run as the safety-net record.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Docs link check
        run: pnpm docs:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Root-level scripts (release / e2e affected matrix / gallery) live outside
      # any workspace package, so `turbo run test` doesn't cover them. Run their
      # node:test suites here so e.g. the affected-e2e-matrix routing rules are gated.
      - name: Test scripts
        run: pnpm test:release

      - name: Build
        run: pnpm build

  integration:
    name: Integration Tests
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build (platform + workbench-ui dist required for integration imports)
        run: pnpm build --filter=@universe-editor/platform... --filter=@universe-editor/workbench-ui...

      - name: Run integration tests
        run: pnpm --filter @universe-editor/editor test:integration

  # Cross-repo ACP contract test: spawns the REAL built fork dist and asserts the
  # editor↔fork ext-method / _meta wire shape (see acpForkContract.integration.test).
  # Needs the submodules + `pnpm agent:build`, so it's gated by detect-affected to
  # the editor↔fork wire surface (main push forces it on). In the plain
  # `integration` job above the same spec self-skips (no fork dist there).
  acp-contract:
    name: ACP Cross-Repo Contract
    needs: detect-affected
    if: needs.detect-affected.outputs.acp-contract == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Cache agent vendor deps
        uses: actions/cache@v4
        with:
          path: vendor/claude-agent-acp/node_modules
          key: agent-deps-${{ runner.os }}-${{ hashFiles('vendor/claude-agent-acp/package-lock.json') }}

      - name: Cache codex agent vendor deps
        uses: actions/cache@v4
        with:
          path: vendor/codex-acp/node_modules
          key: codex-agent-deps-${{ runner.os }}-${{ hashFiles('vendor/codex-acp/package-lock.json') }}

      # The contract test imports editor renderer source; platform dist must exist.
      - name: Build (platform dist required for integration imports)
        run: pnpm build --filter=@universe-editor/platform...

      # Build both fork dist artifacts (the real subprocess the contract test spawns).
      - name: Build agent forks
        run: pnpm agent:build

      # Runs the offline contract core: the ext-method NAME table + the
      # initialize handshake for both forks. The claude ext-method routing leg
      # self-skips here (it needs a real Claude binary via CLAUDE_CODE_EXECUTABLE,
      # which CI has no reason to install); it runs in local dev instead.
      - name: Run ACP contract test
        run: pnpm --filter @universe-editor/editor test:integration acpForkContract

  # Decide which E2E suites to run. On a PR we scope to what the change touched
  # (turbo affected, base = origin/main); on a main push we force EVERYTHING —
  # the full run is the safety net for the affected heuristic. Outputs drive the
  # `e2e` (core) gate and the `e2e-extensions` matrix below.
  detect-affected:
    name: Detect affected E2E
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      core: ${{ steps.detect.outputs.core }}
      extensions: ${{ steps.detect.outputs.extensions }}
      has-extensions: ${{ steps.detect.outputs.has-extensions }}
      external: ${{ steps.detect.outputs.external }}
      has-external: ${{ steps.detect.outputs.has-external }}
      package-windows: ${{ steps.detect.outputs.package-windows }}
      acp-contract: ${{ steps.detect.outputs.acp-contract }}
    steps:
      - uses: actions/checkout@v4
        with:
          # affected diffing needs history back to the merge base with main.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute affected E2E matrix
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
            node scripts/e2e/affected-e2e-matrix.mjs --base origin/${{ github.base_ref }}
          else
            node scripts/e2e/affected-e2e-matrix.mjs --all
          fi

  e2e:
    name: E2E Smoke (${{ matrix.os }} ${{ matrix.shard }}/2)
    needs: detect-affected
    if: needs.detect-affected.outputs.core == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        shard: [1, 2]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Playwright bundles its own browsers — for `_electron` tests we only need
      # the Linux system libs (libnss3, libgtk, etc). On Windows nothing extra
      # is needed.
      - name: Install Playwright system dependencies (Linux)
        if: runner.os == 'Linux'
        run: pnpm --filter @universe-editor/editor exec playwright install-deps

      # The core suite's scoped fixtures (smoke.peekPreview / smoke.outline) drive
      # a real tsserver via the typescript extension, whose vendored
      # typescript-language-server lives OUTSIDE the pnpm workspace (installed via
      # npm). Without it those specs see empty symbols. Install just this vendor —
      # NOT the full vendor-install/agent:build, which needs the claude-agent-acp
      # submodule (not checked out in this job).
      - name: Install vendored typescript-language-server (TS LSP for peek/outline e2e)
        run: npm --prefix vendor/typescript-language-server ci

      - name: Build
        run: pnpm build

      - name: Run E2E smoke (Linux, xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --shard=${{ matrix.shard }}/2

      # @regression cases guard specific fixed bugs (not core-path smoke). They are
      # excluded from the local `pnpm e2e` main pass to keep the day-to-day loop
      # fast, but still block CI here — same parallel shard×2 mechanism as the main
      # pass. Tag filtering lives in the shared config (UNIVERSE_E2E_ONLY_TAG); no
      # --grep flag. See apps/editor/e2e/RUNBOOK.md.
      - name: Run E2E regression (Linux, xvfb)
        if: runner.os == 'Linux'
        run: UNIVERSE_E2E_ONLY_TAG=@regression xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --shard=${{ matrix.shard }}/2

      # @serial cases switch the workspace twice and trip a cross-process race in
      # @parcel/watcher's windows backend under parallel workers; pin to one
      # worker. Run only on shard 1 so the (small) serial set isn't duplicated.
      - name: Run E2E smoke serial (Linux, xvfb)
        if: runner.os == 'Linux' && matrix.shard == 1
        run: UNIVERSE_E2E_ONLY_TAG=@serial xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --workers=1

      # @flaky cases (e.g. headless drag-and-drop) are environment-sensitive, not
      # regressions — run them separately, report-only, so they never block the
      # @p0/@p1 gate. See apps/editor/e2e/RUNBOOK.md. Only on shard 1.
      - name: Run E2E flaky (Linux, xvfb, non-blocking)
        if: runner.os == 'Linux' && matrix.shard == 1
        continue-on-error: true
        run: UNIVERSE_E2E_ONLY_TAG=@flaky xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --workers=1

      # @perf records the startup timeline into a JSON artifact (observe-only, no
      # budget assertion). Single worker, Linux+shard 1 only. Non-blocking; the
      # metrics are uploaded below for regression tracking. See e2e/RUNBOOK.md.
      - name: Run E2E startup perf (Linux, xvfb, observe-only)
        if: runner.os == 'Linux' && matrix.shard == 1
        continue-on-error: true
        run: UNIVERSE_E2E_ONLY_TAG=@perf xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --workers=1

      - name: Upload startup metrics
        if: always() && runner.os == 'Linux' && matrix.shard == 1
        uses: actions/upload-artifact@v4
        with:
          name: startup-metrics
          path: apps/editor/e2e/test-results/startup-metrics.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Run E2E smoke (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --shard=${{ matrix.shard }}/2

      # @regression: bug-guard cases excluded from the local main pass; still block
      # CI here via the same parallel shard×2 mechanism. Tag filtering lives in the
      # shared config (UNIVERSE_E2E_ONLY_TAG); no --grep flag. See e2e/RUNBOOK.md.
      - name: Run E2E regression (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: UNIVERSE_E2E_ONLY_TAG=@regression pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --shard=${{ matrix.shard }}/2

      - name: Run E2E smoke serial (Windows)
        if: runner.os == 'Windows' && matrix.shard == 1
        shell: bash
        run: UNIVERSE_E2E_ONLY_TAG=@serial pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --workers=1

      - name: Run E2E flaky (Windows, non-blocking)
        if: runner.os == 'Windows' && matrix.shard == 1
        continue-on-error: true
        shell: bash
        run: UNIVERSE_E2E_ONLY_TAG=@flaky pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --workers=1

      # - name: Run visual regression (Linux only)
      #   if: runner.os == 'Linux'
      #   run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor test:visual

      - name: Upload visual diff artifacts
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ matrix.os }}-${{ matrix.shard }}
          path: apps/editor/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}-${{ matrix.shard }}
          path: apps/editor/e2e/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results (traces / videos / screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.os }}-${{ matrix.shard }}
          path: apps/editor/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

  # Per-extension E2E: one job per affected extension (see detect-affected). Each
  # extension owns its e2e/ dir + playwright.config.ts and runs against the shared
  # packaged editor build with ONLY that extension activated (P2 minimal set). The
  # matrix is empty on PRs that touch no extension → the job is skipped entirely.
  e2e-extensions:
    name: E2E ${{ matrix.suite.dir }}
    needs: detect-affected
    if: needs.detect-affected.outputs.has-extensions == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.detect-affected.outputs.extensions) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install Playwright system dependencies (Linux)
        run: pnpm --filter @universe-editor/editor exec playwright install-deps

      # typescript extension specs drive the vendored typescript-language-server
      # (outside the pnpm workspace). Only install it for suites that need it.
      - name: Install vendored typescript-language-server
        if: matrix.suite.prep == 'tsserver'
        run: npm --prefix vendor/typescript-language-server ci

      - name: Build
        run: pnpm build

      - name: Run extension E2E (xvfb)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter ${{ matrix.suite.name }} e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite.prep }}-${{ strategy.job-index }}
          path: ${{ matrix.suite.dir }}/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results (traces / videos / screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.suite.prep }}-${{ strategy.job-index }}
          path: ${{ matrix.suite.dir }}/test-results
          retention-days: 14
          if-no-files-found: ignore

  # Per-external-extension E2E: the marketplace extensions under extensions-external/*
  # are OUTSIDE the pnpm/turbo workspace, so they can't ride the turbo-affected matrix
  # above. detect-affected computes them by git path diff instead (a change to a
  # suite's dir, or to shared infra — editor / harness / contract / extension-host —
  # fans out to all). Each suite loads its extension off disk (VSCode's
  # --extensionDevelopmentPath model) via its own `e2e` script; no vsix install.
  e2e-external:
    name: E2E ${{ matrix.suite.dir }}
    needs: detect-affected
    if: needs.detect-affected.outputs.has-external == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.detect-affected.outputs.external) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install Playwright system dependencies (Linux)
        run: pnpm --filter @universe-editor/editor exec playwright install-deps

      # `pnpm --filter <pkg> build` calls the package's own build script directly,
      # bypassing turbo — so it wouldn't build the editor's workspace deps first
      # (e.g. @universe-editor/extension-gallery), and vite fails to resolve their
      # dist entry. Go through turbo with the `...` suffix to build deps + editor.
      #
      # @universe-editor/extension-host is NOT an editor dependency (the main
      # process loads its bundled dist/bootstrap.js by PATH at runtime, never
      # imports it), so `editor...` alone leaves that dist stale/absent and the
      # host scans zero user extensions → these suites all fail. Build it too.
      - name: Build editor + extension host
        run: pnpm build --filter=@universe-editor/editor... --filter=@universe-editor/extension-host...

      # The Excel extension bundles SheetJS from its own node_modules; install it
      # before the suite's build step runs. pdf / eslint self-resolve their build
      # deps from a workspace package (borrow), so they need no prep.
      - name: Install Excel extension deps
        if: matrix.suite.prep == 'xlsx'
        run: npm --prefix extensions-external/${{ matrix.suite.name }} ci

      - name: Run external extension E2E (xvfb)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm --prefix extensions-external/${{ matrix.suite.name }} run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-external-${{ matrix.suite.name }}
          path: ${{ matrix.suite.dir }}/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results (traces / videos / screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-external-${{ matrix.suite.name }}
          path: ${{ matrix.suite.dir }}/test-results
          retention-days: 14
          if-no-files-found: ignore

  bench:
    name: Benchmark
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build (platform dist required by bench imports)
        run: pnpm build --filter=@universe-editor/platform...

      - name: Run benchmarks
        run: pnpm --filter @universe-editor/editor bench

      # Build the renderer and report its gzipped bundle size against the
      # committed baseline. Soft (the whole bench job is continue-on-error) — a
      # regression shows up in logs/artifact without blocking the PR.
      - name: Build editor (renderer assets for bundle-size)
        run: pnpm build --filter=@universe-editor/editor

      - name: Report renderer bundle size
        run: pnpm bundle-size

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: apps/editor/bench/baselines/
          retention-days: 30
          if-no-files-found: ignore

  package-windows:
    name: Package Windows Executable
    needs: detect-affected
    if: needs.detect-affected.outputs.package-windows == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Cache agent vendor deps
        uses: actions/cache@v4
        with:
          path: vendor/claude-agent-acp/node_modules
          key: agent-deps-${{ runner.os }}-${{ hashFiles('vendor/claude-agent-acp/package-lock.json') }}

      - name: Cache codex agent vendor deps
        uses: actions/cache@v4
        with:
          path: vendor/codex-acp/node_modules
          key: codex-agent-deps-${{ runner.os }}-${{ hashFiles('vendor/codex-acp/package-lock.json') }}

      - name: Build Windows release artifacts
        run: pnpm --filter @universe-editor/editor package:win

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: universe-editor-windows-release
          path: apps/editor/release
          retention-days: 14
          if-no-files-found: error
