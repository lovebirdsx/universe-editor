name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Docs link check
        run: pnpm docs:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  integration:
    name: Integration Tests
    needs: ci
    runs-on: ubuntu-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build (platform + workbench-ui dist required for integration imports)
        run: pnpm build --filter=@universe-editor/platform... --filter=@universe-editor/workbench-ui...

      - name: Run integration tests
        run: pnpm --filter @universe-editor/editor test:integration

  e2e:
    name: E2E Smoke (${{ matrix.os }} ${{ matrix.shard }}/2)
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        shard: [1, 2]
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Playwright bundles its own browsers — for `_electron` tests we only need
      # the Linux system libs (libnss3, libgtk, etc). On Windows nothing extra
      # is needed.
      - name: Install Playwright system dependencies (Linux)
        if: runner.os == 'Linux'
        run: pnpm --filter @universe-editor/editor exec playwright install-deps

      # The `typescript` built-in extension spawns the vendored
      # typescript-language-server, whose node_modules live OUTSIDE the pnpm
      # workspace (installed via npm, not `pnpm install`). Without it the TS
      # plugin never activates and the outline e2e sees empty symbols. Install
      # just this vendor — NOT the full vendor-install/agent:build, which also
      # needs the claude-agent-acp submodule (not checked out in this job).
      - name: Install vendored typescript-language-server (TS LSP for outline e2e)
        run: npm --prefix vendor/typescript-language-server ci

      - name: Build
        run: pnpm build

      # The Excel diff extension lives OUTSIDE the pnpm workspace (ships as a
      # `.vsix`, gitignored) and is the only e2e that installs a real on-disk
      # vsix — smoke.swarmSpreadsheetDiff resolves it by path. Without it adm-zip
      # throws "Invalid filename" on the missing file. Its own node_modules
      # (SheetJS) install via npm; `package` bundles + zips the vsix (needs
      # packages/extension-api/dist from `pnpm build` above, and esbuild borrowed
      # from a workspace extension — both present by now).
      - name: Build Excel diff extension vsix (swarm spreadsheet diff e2e)
        shell: bash
        run: |
          npm --prefix extensions-external/excel-diff ci
          npm --prefix extensions-external/excel-diff run package

      - name: Run E2E smoke (Linux, xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep-invert "@visual|@serial|@flaky|@perf|@regression" --shard=${{ matrix.shard }}/2

      # @regression cases guard specific fixed bugs (not core-path smoke). They are
      # excluded from the local `pnpm e2e` main pass to keep the day-to-day loop
      # fast, but still block CI here — same parallel shard×2 mechanism as the main
      # pass. See apps/editor/e2e/RUNBOOK.md.
      - name: Run E2E regression (Linux, xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep @regression --shard=${{ matrix.shard }}/2

      # @serial cases switch the workspace twice and trip a cross-process race in
      # @parcel/watcher's windows backend under parallel workers; pin to one
      # worker. Run only on shard 1 so the (small) serial set isn't duplicated.
      - name: Run E2E smoke serial (Linux, xvfb)
        if: runner.os == 'Linux' && matrix.shard == 1
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep @serial --workers=1

      # @flaky cases (e.g. headless drag-and-drop) are environment-sensitive, not
      # regressions — run them separately, report-only, so they never block the
      # @p0/@p1 gate. See apps/editor/e2e/RUNBOOK.md. Only on shard 1.
      - name: Run E2E flaky (Linux, xvfb, non-blocking)
        if: runner.os == 'Linux' && matrix.shard == 1
        continue-on-error: true
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep @flaky --workers=1

      # @perf records the startup timeline into a JSON artifact (observe-only, no
      # budget assertion). Single worker, Linux+shard 1 only. Non-blocking; the
      # metrics are uploaded below for regression tracking. See e2e/RUNBOOK.md.
      - name: Run E2E startup perf (Linux, xvfb, observe-only)
        if: runner.os == 'Linux' && matrix.shard == 1
        continue-on-error: true
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep @perf --workers=1

      - name: Upload startup metrics
        if: always() && runner.os == 'Linux' && matrix.shard == 1
        uses: actions/upload-artifact@v4
        with:
          name: startup-metrics
          path: apps/editor/e2e/test-results/startup-metrics.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Run E2E smoke (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep-invert "@visual|@serial|@flaky|@perf|@regression" --shard=${{ matrix.shard }}/2

      # @regression: bug-guard cases excluded from the local main pass; still block
      # CI here via the same parallel shard×2 mechanism. See e2e/RUNBOOK.md.
      - name: Run E2E regression (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep @regression --shard=${{ matrix.shard }}/2

      - name: Run E2E smoke serial (Windows)
        if: runner.os == 'Windows' && matrix.shard == 1
        shell: bash
        run: pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep @serial --workers=1

      - name: Run E2E flaky (Windows, non-blocking)
        if: runner.os == 'Windows' && matrix.shard == 1
        continue-on-error: true
        shell: bash
        run: pnpm --filter @universe-editor/editor exec playwright test -c e2e/playwright.config.ts --grep @flaky --workers=1

      # - name: Run visual regression (Linux only)
      #   if: runner.os == 'Linux'
      #   run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor test:visual

      - name: Upload visual diff artifacts
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ matrix.os }}-${{ matrix.shard }}
          path: apps/editor/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}-${{ matrix.shard }}
          path: apps/editor/e2e/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results (traces / videos / screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.os }}-${{ matrix.shard }}
          path: apps/editor/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

  bench:
    name: Benchmark
    needs: ci
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build (platform dist required by bench imports)
        run: pnpm build --filter=@universe-editor/platform...

      - name: Run benchmarks
        run: pnpm --filter @universe-editor/editor bench

      # Build the renderer and report its gzipped bundle size against the
      # committed baseline. Soft (the whole bench job is continue-on-error) — a
      # regression shows up in logs/artifact without blocking the PR.
      - name: Build editor (renderer assets for bundle-size)
        run: pnpm build --filter=@universe-editor/editor

      - name: Report renderer bundle size
        run: pnpm bundle-size

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: apps/editor/bench/baselines/
          retention-days: 30
          if-no-files-found: ignore

  package-windows:
    name: Package Windows Executable
    needs: ci
    runs-on: windows-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Cache agent vendor deps
        uses: actions/cache@v4
        with:
          path: vendor/claude-agent-acp/node_modules
          key: agent-deps-${{ runner.os }}-${{ hashFiles('vendor/claude-agent-acp/package-lock.json') }}

      - name: Cache codex agent vendor deps
        uses: actions/cache@v4
        with:
          path: vendor/codex-acp/node_modules
          key: codex-agent-deps-${{ runner.os }}-${{ hashFiles('vendor/codex-acp/package-lock.json') }}

      - name: Build Windows release artifacts
        run: pnpm --filter @universe-editor/editor package:win

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: universe-editor-windows-release
          path: apps/editor/release
          retention-days: 14
          if-no-files-found: error
