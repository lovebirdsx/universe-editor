name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  integration:
    name: Integration Tests
    needs: ci
    runs-on: ubuntu-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (platform dist required for integration imports)
        run: pnpm build

      - name: Run integration tests
        run: pnpm --filter @universe-editor/editor test:integration

  e2e:
    name: E2E Smoke (${{ matrix.os }})
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright bundles its own browsers — for `_electron` tests we only need
      # the Linux system libs (libnss3, libgtk, etc). On Windows nothing extra
      # is needed.
      - name: Install Playwright system dependencies (Linux)
        if: runner.os == 'Linux'
        run: pnpm --filter @universe-editor/editor exec playwright install-deps

      - name: Build
        run: pnpm build

      - name: Run E2E smoke (Linux, xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor e2e

      - name: Run E2E smoke (Windows)
        if: runner.os == 'Windows'
        run: pnpm --filter @universe-editor/editor e2e

      - name: Run visual regression (Linux only)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm --filter @universe-editor/editor test:visual

      - name: Upload visual diff artifacts
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ matrix.os }}
          path: apps/editor/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: apps/editor/e2e/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results (traces / videos / screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.os }}
          path: apps/editor/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

  bench:
    name: Benchmark
    needs: ci
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (platform dist required by bench imports)
        run: pnpm build

      - name: Run benchmarks
        run: pnpm --filter @universe-editor/editor bench

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: apps/editor/bench/baselines/
          retention-days: 30
          if-no-files-found: ignore

  package-windows:
    name: Package Windows Executable
    needs: ci
    runs-on: windows-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows release artifacts
        run: pnpm --filter @universe-editor/editor package:win

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: universe-editor-windows-release
          path: apps/editor/release
          retention-days: 14
          if-no-files-found: error
