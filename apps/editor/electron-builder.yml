appId: io.universe.editor
productName: Universe Editor
# OS-level deep-link protocol. On macOS this becomes a CFBundleURLTypes entry in
# Info.plist; on Windows NSIS registers the scheme. The main process also calls
# app.setAsDefaultProtocolClient('universe-editor') at runtime as a fallback.
protocols:
  - name: Universe Editor
    schemes:
      - universe-editor
directories:
  output: release
artifactName: '${productName}-${version}-${os}-${arch}.${ext}'
# 内网自建静态服务器分发更新。把 release/ 下的 latest.yml + .exe + .blockmap
# 同步到该 url 指向的目录即可；autoUpdater 启动时 GET `${url}/latest.yml` 比对版本。
# 此处仅为打包默认；发布版可在运行时覆盖 feed（不必重新打包）：
#   --update-url=<url> / 环境变量 UNIVERSE_UPDATE_URL / <userData>/update-config.json 的 updateUrl 字段。
publish:
  provider: generic
  url: http://iloop.aki.kuro.com:9999/universe-editor/
  channel: latest
# 只保留应用实际用到的 Chromium locale。Electron 默认带 55 个 .pak(~41MB,多为
# 印度语系),而本应用 NLS 只有 en-US + zh-CN。删掉多余的省 ~39MB 净荷——静默更新
# 的安装耗时随净荷字节近似线性(NSIS 解压把净荷双写落盘 + Defender 扫描),故瘦身
# 直接缩短安装停机。electron-builder 会按此列表裁掉不匹配的 locales/*.pak(全平台生效)。
electronLanguages:
  - en-US
  - zh-CN
# 打包后删框架释放到根目录、运行期用不到的大文件(LICENSES.chromium.html ~8.7MB)。
# `files: '!'` 管不到框架文件,只能走 afterPack 钩子。见 build/afterPack.cjs。
afterPack: build/afterPack.cjs
files:
  - out/**/*
  - package.json
# @parcel/watcher is a prebuilt N-API native module; its .node binaries must be
# unpacked from the asar so they can be dlopen'd at runtime. No rebuild needed.
npmRebuild: false
asarUnpack:
  - '**/node_modules/@parcel/watcher/**'
  - '**/node_modules/@parcel/watcher-*/**'
  - '**/node_modules/@vscode/ripgrep/**'
  - '**/node_modules/@vscode/ripgrep-*/**'
  - '**/node_modules/@lydell/node-pty/**'
  - '**/node_modules/@lydell/node-pty-*/**'
extraResources:
  # Generated by `pnpm -w run runtime:stage`.
  # Contains every resource that must live beside app.asar:
  # - claude-agent-acp/dist
  # - extension-host/dist
  # - typescript-language-server/node_modules (tsls CLI + tsserver)
  # - built-in extensions from extensions/* (markdown bundles its language server)
  # - release-notes.json
  # - user guide docs (docs/user/) as plain files, read at runtime via IDocsService
  - from: .runtime-resources
    to: .
extraFiles:
  # CLI wrapper scripts placed at $INSTDIR/bin/; installer adds $INSTDIR/bin to user PATH.
  - from: resources/cli
    to: bin
  # Defender exclusion helper scripts; installer.nsh runs them elevated on opt-in.
  - from: resources/defender
    to: resources/defender
win:
  icon: public/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  executableName: Universe Editor
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon.ico
  uninstallerIcon: public/icon.ico
  installerHeaderIcon: public/icon.ico
  include: build/installer.nsh
mac:
  target: dmg
linux:
  target: AppImage
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
