appId: io.universe.editor
productName: Universe Editor
directories:
  output: release
artifactName: '${productName}-${version}-${os}-${arch}.${ext}'
files:
  - out/**/*
  - package.json
extraResources:
  # Bundled Claude ACP agent (git submodule at repo `vendor/`). Run
  # `pnpm agent:build` first so dist + production node_modules exist.
  # Placed outside the asar so the main process can spawn it directly.
  - from: ../../vendor/claude-agent-acp/dist
    to: claude-agent-acp/dist
  - from: ../../vendor/claude-agent-acp/node_modules
    to: claude-agent-acp/node_modules
  - from: ../../vendor/claude-agent-acp/package.json
    to: claude-agent-acp/package.json
win:
  icon: public/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  executableName: Universe Editor
nsis:
  installerIcon: public/icon.ico
  uninstallerIcon: public/icon.ico
  installerHeaderIcon: public/icon.ico
mac:
  target: dmg
linux:
  target: AppImage
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
