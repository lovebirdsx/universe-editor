appId: io.universe.editor
productName: Universe Editor
directories:
  output: release
artifactName: '${productName}-${version}-${os}-${arch}.${ext}'
# 内网自建静态服务器分发更新。把 release/ 下的 latest.yml + .exe + .blockmap
# 同步到该 url 指向的目录即可；autoUpdater 启动时 GET `${url}/latest.yml` 比对版本。
# 此处仅为打包默认；发布版可在运行时覆盖 feed（不必重新打包）：
#   --update-url=<url> / 环境变量 UNIVERSE_UPDATE_URL / <userData>/update-config.json 的 updateUrl 字段。
publish:
  provider: generic
  url: http://iloop.aki.kuro.com:9999/universe-editor/
  channel: latest
files:
  - out/**/*
  - package.json
extraResources:
  # Bundled Claude ACP agent (git submodule at repo `vendor/`). Run
  # `pnpm agent:build` first so `dist/` (esbuild single-file bundle +
  # claude-binary.json version metadata) exists. The native claude binary is
  # NOT shipped — it is fetched on demand into userData (or a system install is
  # reused), so only the small JS bundle goes in `resources/`.
  - from: ../../vendor/claude-agent-acp/dist
    to: claude-agent-acp/dist
  # Release notes generated from git history (pnpm release:notes). Read by the
  # main-process ReleaseNotesMainService and shown after an upgrade.
  - from: resources/release-notes.json
    to: release-notes.json
win:
  icon: public/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  executableName: Universe Editor
nsis:
  installerIcon: public/icon.ico
  uninstallerIcon: public/icon.ico
  installerHeaderIcon: public/icon.ico
mac:
  target: dmg
linux:
  target: AppImage
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
