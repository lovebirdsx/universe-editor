<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#31324a"/>
      <stop offset="1" stop-color="#232436"/>
    </linearGradient>
    <clipPath id="card">
      <rect x="4" y="4" width="120" height="120" rx="22"/>
    </clipPath>
  </defs>

  <!-- 编辑器卡片 -->
  <rect x="4" y="4" width="120" height="120" rx="22" fill="url(#bg)"/>
  <g clip-path="url(#card)">
    <!-- 活动条 + 侧栏 -->
    <rect x="4" y="4" width="11" height="120" fill="#1b1c2b"/>
    <rect x="15" y="4" width="24" height="120" fill="#282940"/>
    <rect x="39" y="4" width="2" height="120" fill="#3d3e60"/>
    <!-- 侧栏行（窗口小部件剪影） -->
    <rect x="20" y="18" width="14" height="5" rx="2.5" fill="#45466c"/>
    <rect x="20" y="29" width="10" height="5" rx="2.5" fill="#3a3b5c"/>
    <rect x="20" y="40" width="13" height="5" rx="2.5" fill="#3a3b5c"/>
    <!-- 标签栏 -->
    <rect x="45" y="12" width="26" height="8" rx="4" fill="#45466c"/>
    <rect x="76" y="12" width="18" height="8" rx="4" fill="#383956"/>

    <!-- 代码行（暗示打开的游戏资产/脚本） -->
    <rect x="48" y="33" width="30" height="6" rx="3" fill="#565880"/>
    <rect x="48" y="45" width="46" height="6" rx="3" fill="#4c4e74"/>
    <rect x="48" y="57" width="22" height="6" rx="3" fill="#565880"/>
    <rect x="48" y="69" width="38" height="6" rx="3" fill="#4c4e74"/>

    <!-- 桥接线：从代码区指向 plug -->
    <path d="M88 58 C 103 58, 107 66, 103 80" fill="none" stroke="#f6b26b" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="1 8"/>

    <!-- plug 徽章（MCP 连接） -->
    <circle cx="101" cy="91" r="23" fill="#e4522e"/>
    <circle cx="101" cy="91" r="23" fill="none" stroke="#232436" stroke-width="5"/>
    <g fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M96 82 v6"/>
      <path d="M106 82 v6"/>
      <path d="M93 88 h16 v4 a8 8 0 0 1 -16 0 Z" fill="#ffffff" stroke="none"/>
      <path d="M101 100 v4.5"/>
    </g>
  </g>
</svg>
