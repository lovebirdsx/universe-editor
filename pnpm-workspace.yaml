packages:
  - 'apps/*'
  - 'packages/*'
  - 'extensions/*'
allowBuilds:
  esbuild: true
  electron: true
  '@parcel/watcher': false
  electron-winstaller: false
allowedDeprecatedVersions:
  boolean: 3.2.0
  glob: 7.2.3
  inflight: 1.0.6
  lodash.isequal: 4.5.0
  rimraf: 2.6.3

catalog:
  # Core
  '@agentclientprotocol/sdk': 0.22.1
  zod: ^3.25.0

  # Release
  '@changesets/cli': ^2.27.0
  '@hono/node-server': ^1.14.0
  '@types/node': ^22.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
  '@vitejs/plugin-react': ^4.3.0

  # Lint
  eslint: ^9.0.0
  eslint-config-prettier: ^9.0.0
  eslint-plugin-prettier: ^5.0.0
  eslint-plugin-react-hooks: ^5.2.0
  prettier: ^3.0.0

  # API
  hono: ^4.7.0

  # React
  react: ^19.0.0
  react-dom: ^19.0.0

  # UI
  allotment: ^1.20.0
  lucide-react: ^0.460.0
  '@fontsource/roboto': ^5.1.0
  monaco-editor: ^0.52.0
  '@floating-ui/react': ^0.27.0
  '@tanstack/react-virtual': ^3.13.0
  '@react-aria/focus': ^3.20.0

  # JSON with comments (settings.json / keybindings.json)
  jsonc-parser: ^3.3.1

  # Markdown language server (vscode-markdown-languageservice in a spawned LSP subprocess).
  # The alpha is pinned (semver ranges are unfriendly to prereleases). markdown-it is the
  # host-provided parser (the language service takes an IMdParser, not markdown-it directly).
  vscode-markdown-languageservice: 0.5.0-alpha.13
  markdown-it: ^14.1.0
  '@types/markdown-it': ^14.1.2
  vscode-languageserver-protocol: ^3.17.5
  vscode-languageserver-textdocument: ^1.0.11
  vscode-languageserver-types: ^3.17.2
  vscode-uri: ^3.0.8

  # Archive extraction (on-demand claude binary download)
  tar: ^7.4.3
  '@vscode/ripgrep': ^1.18.0

  # Node runtime
  '@parcel/watcher': ^2.5.6
  tsx: ^4.19.0
  turbo: ^2.9.16
  typescript: ^5.8.0
  typescript-eslint: ^8.0.0

  # Build tools
  vite: ^7.0.0
  esbuild: ^0.25.0

  # Test
  '@testing-library/react': ^16.0.0
  'happy-dom': ^17.0.0
  vitest: ^3.0.0
  '@playwright/test': ^1.50.0
  pixelmatch: ^5.3.0
  pngjs: ^7.0.0
  '@types/pngjs': ^6.0.0

  # Electron (desktop shell for game content editor)
  electron: ^33.0.0
  electron-vite: ^5.0.0
  electron-builder: ^25.0.0
  # 注:electron-updater 在 apps/editor/package.json 里必须写显式版本(^6.3.0),不能用 catalog:。
  # electron-builder 打包时直接 semver.coerce 读源 package.json 的版本字符串,无法解析 "catalog:"。
  electron-updater: ^6.3.0

  # Integrated terminal (PTY + xterm.js)
  # @lydell/node-pty 是 node-pty 的 prebuilt fork:N-API 二进制(无 ABI 后缀,跨 Node/Electron
  # 版本通用),按平台用 optionalDependencies 分发,安装即用、不调 node-gyp。固定 beta 版本号
  # (semver 范围对 prerelease 不友好)。
  '@lydell/node-pty': 1.2.0-beta.12
  '@xterm/xterm': ^6.0.0
  '@xterm/addon-fit': ^0.11.0
  '@xterm/addon-web-links': ^0.12.0
