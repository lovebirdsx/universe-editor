<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Universe Editor — 下载</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #171a21;
        --fg: #e7e9ee;
        --muted: #9aa3b2;
        --accent: #4c8dff;
        --accent-hover: #3b7af0;
        --border: #262b36;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'Microsoft YaHei',
          sans-serif;
        background: radial-gradient(1200px 600px at 50% -10%, #1b2130, var(--bg));
        color: var(--fg);
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 4px;
      }
      h1 {
        font-size: 22px;
        margin: 0;
        font-weight: 600;
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        margin: 12px 0 28px;
      }
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        background: rgba(76, 141, 255, 0.15);
        color: var(--accent);
        font-weight: 600;
        font-size: 13px;
      }
      .download {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.15s ease;
      }
      .download:hover {
        background: var(--accent-hover);
      }
      .download .size {
        font-weight: 400;
        opacity: 0.85;
        font-size: 14px;
      }
      .notes {
        margin-top: 32px;
      }
      .notes h2 {
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;
        margin: 0 0 16px;
        text-transform: uppercase;
        letter-spacing: 0;
      }
      .version-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--fg);
        margin: 0 0 10px;
      }
      .version-title:not(:first-child) {
        margin-top: 24px;
        padding-top: 22px;
        border-top: 1px solid var(--border);
      }
      .group {
        margin-bottom: 18px;
      }
      .group-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--fg);
      }
      .group ul {
        margin: 0;
        padding-left: 20px;
      }
      .group li {
        font-size: 14px;
        line-height: 1.7;
        color: var(--muted);
      }
      .state {
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        padding: 24px 0;
      }
      .hidden {
        display: none;
      }
      .foot {
        margin-top: 32px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <h1>Universe Editor</h1>
      </div>

      <div id="loading" class="state">正在获取最新版本…</div>

      <div id="content" class="hidden">
        <div class="meta">
          <span class="badge" id="version"></span>
          <span id="date"></span>
        </div>

        <a class="download" id="download" href="#">
          <span>下载 Windows 版</span>
          <span class="size" id="size"></span>
        </a>

        <section class="notes hidden" id="notes">
          <h2>最近 7 天更新</h2>
          <div id="groups"></div>
        </section>
      </div>

      <div id="error" class="state hidden">暂时无法获取版本信息，请稍后重试。</div>

      <div class="foot">Universe Editor · VSCode 范式的游戏内容编辑器</div>
    </main>

    <script>
      // 轻量解析 electron-builder 生成的 latest.yml：只取页面要用的字段，避免引入 YAML 库。
      const NOTE_WINDOW_DAYS = 7
      const DAY_MS = 24 * 60 * 60 * 1000

      function parseLatestYml(text) {
        const lines = text.split(/\r?\n/)
        const out = { version: '', releaseDate: '', files: [] }
        let inFiles = false
        let current = null
        for (const raw of lines) {
          const line = raw.replace(/\s+$/, '')
          const top = /^([a-zA-Z]+):\s*(.*)$/.exec(line)
          if (top && !line.startsWith(' ') && !line.startsWith('-')) {
            inFiles = top[1] === 'files'
            current = null
            if (top[1] === 'version') out.version = top[2].trim()
            else if (top[1] === 'releaseDate') out.releaseDate = unquote(top[2].trim())
            continue
          }
          if (!inFiles) continue
          const urlMatch = /^\s*-\s*url:\s*(.+)$/.exec(line)
          if (urlMatch) {
            current = { url: unquote(urlMatch[1].trim()), size: 0 }
            out.files.push(current)
            continue
          }
          const sizeMatch = /^\s*size:\s*(\d+)\s*$/.exec(line)
          if (sizeMatch && current) current.size = Number(sizeMatch[1])
        }
        return out
      }

      function unquote(s) {
        return s.replace(/^['"]|['"]$/g, '')
      }

      function formatSize(bytes) {
        if (!bytes) return ''
        const mb = bytes / (1024 * 1024)
        return mb >= 1 ? `${mb.toFixed(1)} MB` : `${Math.round(bytes / 1024)} KB`
      }

      function formatDate(raw) {
        if (!raw) return ''
        const dateKey = toDateKey(raw)
        if (dateKey) return dateKey
        const d = new Date(raw)
        if (Number.isNaN(d.getTime())) return String(raw).slice(0, 10)
        const p = (n) => String(n).padStart(2, '0')
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`
      }

      function toDateKey(raw) {
        if (!raw) return ''
        const text = String(raw)
        const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(text)
        if (m) {
          const key = `${m[1]}-${m[2]}-${m[3]}`
          return Number.isNaN(dateKeyToDay(key)) ? '' : key
        }
        const d = new Date(text)
        if (Number.isNaN(d.getTime())) return ''
        return formatUtcDate(d)
      }

      function formatUtcDate(date) {
        const p = (n) => String(n).padStart(2, '0')
        return `${date.getUTCFullYear()}-${p(date.getUTCMonth() + 1)}-${p(date.getUTCDate())}`
      }

      function dateKeyToDay(key) {
        const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(key)
        if (!m) return Number.NaN
        const year = Number(m[1])
        const month = Number(m[2])
        const day = Number(m[3])
        const time = Date.UTC(year, month - 1, day)
        const d = new Date(time)
        if (
          d.getUTCFullYear() !== year ||
          d.getUTCMonth() + 1 !== month ||
          d.getUTCDate() !== day
        ) {
          return Number.NaN
        }
        return Math.floor(time / DAY_MS)
      }

      function show(id) {
        document.getElementById(id).classList.remove('hidden')
      }
      function hide(id) {
        document.getElementById(id).classList.add('hidden')
      }

      function findNoteByVersion(notes, version) {
        return Array.isArray(notes) ? notes.find((n) => n && n.version === version) : null
      }

      function selectRecentNotes(notes, latest) {
        if (!Array.isArray(notes)) return []
        const current = findNoteByVersion(notes, latest.version)
        const anchorKey = toDateKey(current && current.date) || toDateKey(latest.releaseDate)
        if (!anchorKey) return []
        const anchorDay = dateKeyToDay(anchorKey)
        const startDay = anchorDay - NOTE_WINDOW_DAYS + 1
        return notes.filter((note) => {
          if (!note) return false
          const noteDay = dateKeyToDay(toDateKey(note.date))
          return noteDay >= startDay && noteDay <= anchorDay
        })
      }

      function hasRenderableGroups(entry) {
        return (
          entry &&
          Array.isArray(entry.groups) &&
          entry.groups.some((group) => Array.isArray(group.items) && group.items.length > 0)
        )
      }

      function renderNotes(notes, latest) {
        const recent = selectRecentNotes(notes, latest)
        const current = findNoteByVersion(notes, latest.version)
        const entries = recent.length > 0 ? recent : current ? [current] : []
        if (entries.length === 0) return
        const container = document.getElementById('groups')
        container.textContent = ''
        for (const entry of entries) {
          if (!hasRenderableGroups(entry)) continue
          renderVersionHeader(container, entry)
          for (const group of entry.groups) {
            renderGroup(container, group)
          }
        }
        if (container.children.length > 0) show('notes')
      }

      function renderVersionHeader(container, entry) {
        const title = document.createElement('div')
        title.className = 'version-title'
        const date = formatDate(entry.date)
        title.textContent = date ? `v${entry.version} · ${date}` : `v${entry.version}`
        container.appendChild(title)
      }

      function renderGroup(container, group) {
        if (!Array.isArray(group.items) || group.items.length === 0) return
        const wrap = document.createElement('div')
        wrap.className = 'group'
        const title = document.createElement('div')
        title.className = 'group-title'
        title.textContent = group.title || group.type || ''
        const ul = document.createElement('ul')
        for (const item of group.items) {
          const li = document.createElement('li')
          li.textContent = item
          ul.appendChild(li)
        }
        wrap.appendChild(title)
        wrap.appendChild(ul)
        container.appendChild(wrap)
      }

      async function main() {
        try {
          const res = await fetch('latest.yml', { cache: 'no-store' })
          if (!res.ok) throw new Error(`latest.yml ${res.status}`)
          const latest = parseLatestYml(await res.text())
          const exe = latest.files.find((f) => /\.exe$/i.test(f.url))
          if (!exe) throw new Error('latest.yml 中没有 .exe 安装包')

          document.getElementById('version').textContent = `v${latest.version}`
          document.getElementById('date').textContent = formatDate(latest.releaseDate)
          const link = document.getElementById('download')
          link.href = encodeURI(exe.url)
          link.setAttribute('download', '')
          document.getElementById('size').textContent = formatSize(exe.size)

          hide('loading')
          show('content')

          // 更新日志失败不影响主流程：单独 try，拿不到就只展示下载按钮。
          try {
            const notesRes = await fetch('release-notes.json', { cache: 'no-store' })
            if (notesRes.ok) renderNotes(await notesRes.json(), latest)
          } catch {
            /* 忽略：无更新日志时不展示该区块 */
          }
        } catch {
          hide('loading')
          show('error')
        }
      }

      main()
    </script>
  </body>
</html>
